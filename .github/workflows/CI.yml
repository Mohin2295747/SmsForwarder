name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build arm64-v8a Release APK
      run: |
        ./gradlew assembleRelease --no-daemon -Pandroid.injected.build.abi=arm64-v8a \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/key/mykey.jks \
          -Pandroid.injected.signing.store.password=mypassword \
          -Pandroid.injected.signing.key.alias=myalias \
          -Pandroid.injected.signing.key.password=mypassword
    
    - name: Find and Upload APK
      run: |
        echo "Looking for APK in all possible locations..."
        find . -name "*.apk" -type f
        echo ""
        echo "Looking in build/outputs folder..."
        ls -la build/app/outputs/apk/release/ || echo "Path not found"
        echo ""
        echo "Looking in app/build/outputs folder..."
        ls -la app/build/outputs/apk/release/ || echo "Path not found"
        
        # Find the actual APK path
        APK_PATH=$(find . -name "*.apk" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"
          mkdir -p apk_upload
          cp "$APK_PATH" apk_upload/
        else
          echo "No APK found!"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmsForwarder_arm64-v8a_release
        path: apk_upload/*.apk
        retention-days: 30